<section class="py-16 px-6 md:px-16 bg-white text-gray-800" id="projects">
  <h2 class="text-4xl font-bold text-red-600 mb-10 text-center">Mes Projets</h2>

  <!-- 3 colonnes en desktop -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 max-w-6xl mx-auto">
    <article
      *ngFor="let project of projects; trackBy: trackByTitle"
      class="bg-white shadow-md rounded-xl overflow-hidden p-4 flex flex-col items-center border border-gray-100"
    >
      <!-- Image cliquable vers la fiche interne -->
      <a [routerLink]="['/projets', getProjectId(project.title)]" class="block w-full">
        <img
          [src]="project.image"
          [alt]="project.title + ' – aperçu'"
          class="w-full h-40 object-cover mb-4 rounded-md"
          loading="lazy"
        />
      </a>

      <!-- Titre cliquable vers la fiche interne -->
      <h3 class="text-xl font-semibold mb-2 text-center">
        <a [routerLink]="['/projets', getProjectId(project.title)]" class="hover:underline">
          {{ project.title }}
        </a>
      </h3>

      <p class="text-gray-600 text-sm text-center mb-4">
        {{ project.description }}
      </p>

      <!-- Actions -->
      <div class="flex flex-wrap gap-3 justify-center">
        <a
          [routerLink]="['/projets', getProjectId(project.title)]"
          class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition"
          [attr.aria-label]="'Voir la fiche projet de ' + project.title"
        >
          Voir la fiche
        </a>
      </div>
    </article>
  </div>

  <!-- Lien vers la page liste complète -->
  <div class="text-center mt-8">
    <a
      routerLink="/projets"
      class="inline-block bg-red-600 text-white px-6 py-3 rounded-full font-semibold shadow-lg hover:bg-red-700 transition duration-300"
    >
      Voir tous les projets →
    </a>
  </div>
</section>
